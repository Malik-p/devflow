version: "3.9"

services:

  backend:
    build: ./server
    container_name: devflow-backend

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    restart: always

  frontend:
    build: ./client
    container_name: devflow-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: always